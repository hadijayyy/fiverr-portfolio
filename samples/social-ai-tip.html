<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Automation Tip &mdash; Social Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f2f5;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
  }

  .card {
    width: 540px;
    height: 540px;
    background: linear-gradient(145deg, #1e1b4b 0%, #312e81 50%, #3730a3 100%);
    border-radius: 32px;
    padding: 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: 0 20px 60px rgba(49,46,129,0.35);
    position: relative;
    overflow: hidden;
  }

  /* subtle decorative circles */
  .card::before {
    content: '';
    position: absolute;
    top: -80px;
    right: -80px;
    width: 240px;
    height: 240px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 180px;
    height: 180px;
    background: rgba(255,255,255,0.03);
    border-radius: 50%;
  }

  .icon-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(4px);
    padding: 8px 18px;
    border-radius: 40px;
    margin-bottom: 32px;
    align-self: flex-start;
    font-size: 13px;
    font-weight: 700;
    color: #a5b4fc;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .icon-badge span {
    font-size: 18px;
  }

  .main-text {
    font-size: 38px;
    font-weight: 900;
    line-height: 1.2;
    color: #ffffff;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 1;
  }

  .main-text .highlight {
    background: linear-gradient(135deg, #c7d2fe, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stats {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
    padding: 14px 22px;
    border-radius: 16px;
    align-self: flex-start;
    position: relative;
    z-index: 1;
    margin-top: 8px;
  }

  .stats .number {
    font-size: 28px;
    font-weight: 800;
    color: #c7d2fe;
  }

  .stats .label {
    font-size: 15px;
    font-weight: 600;
    color: #a5b4fc;
    line-height: 1.3;
  }

  .bottom-bar {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
    padding-top: 20px;
  }

  .bottom-bar .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #818cf8;
  }

  .bottom-bar .handle {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon-badge">
    <span>⚡</span> AI Automation
  </div>

  <div class="main-text">
    Stop doing<br>
    <span class="highlight">repetitive tasks.</span><br>
    Let AI handle<br>
    data entry, scheduling,<br>
    and reporting.
  </div>

  <div class="stats">
    <span class="number">10+</span>
    <span class="label">hours saved<br>per week</span>
  </div>

  <div class="bottom-bar">
    <span class="dot"></span>
    <span class="dot" style="opacity:0.4;"></span>
    <span class="dot" style="opacity:0.2;"></span>
    <span class="handle" style="margin-left:auto;">@ai_automation</span>
  </div>
</div>
</body>
</html>
