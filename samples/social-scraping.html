<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Scraping Use Case &mdash; Social Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f2f5;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
  }

  .card {
    width: 540px;
    height: 540px;
    background: linear-gradient(145deg, #022c22 0%, #064e3b 50%, #047857 100%);
    border-radius: 32px;
    padding: 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: 0 20px 60px rgba(4,120,87,0.35);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -80px;
    right: -80px;
    width: 240px;
    height: 240px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 180px;
    height: 180px;
    background: rgba(255,255,255,0.03);
    border-radius: 50%;
  }

  .icon-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(4px);
    padding: 8px 18px;
    border-radius: 40px;
    margin-bottom: 32px;
    align-self: flex-start;
    font-size: 13px;
    font-weight: 700;
    color: #6ee7b7;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .icon-badge span {
    font-size: 18px;
  }

  .main-text {
    font-size: 36px;
    font-weight: 900;
    line-height: 1.25;
    color: #ffffff;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 1;
  }

  .main-text .highlight {
    background: linear-gradient(135deg, #a7f3d0, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 12px;
    position: relative;
    z-index: 1;
  }

  .stat-block {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
    padding: 14px 20px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stat-block .number {
    font-size: 28px;
    font-weight: 800;
    color: #a7f3d0;
  }

  .stat-block .label {
    font-size: 13px;
    font-weight: 600;
    color: #6ee7b7;
    line-height: 1.3;
  }

  .tags {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .tags span {
    background: rgba(255,255,255,0.07);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: #a7f3d0;
    letter-spacing: 0.2px;
  }

  .bottom-bar {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
    padding-top: 20px;
  }

  .bottom-bar .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #34d399;
  }

  .bottom-bar .dot:nth-child(2) { opacity: 0.4; }
  .bottom-bar .dot:nth-child(3) { opacity: 0.2; }

  .bottom-bar .handle {
    margin-left: auto;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon-badge">
    <span>🕸️</span> Web Scraping
  </div>

  <div class="main-text">
    Need competitor<br>
    <span class="highlight">pricing data?</span><br>
    Web scraping can collect<br>
    1,000+ prices<br>
    in minutes.
  </div>

  <div class="stat-row">
    <div class="stat-block">
      <span class="number">1,000+</span>
      <span class="label">prices<br>collected</span>
    </div>
    <div class="stat-block">
      <span class="number">~5</span>
      <span class="label">minutes<br>to run</span>
    </div>
  </div>

  <div class="tags">
    <span>Clean</span>
    <span>Structured</span>
    <span>Ready to analyze</span>
  </div>

  <div class="bottom-bar">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="handle">@web_scraping</span>
  </div>
</div>
</body>
</html>
